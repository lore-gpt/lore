openapi: 3.0.3
info:
  title: Lore API
  version: 0.0.0-dev
  description: |
    HTTP API for Lore, the coordination memory layer for multi-agent AI systems.

    This is the source of truth from which the SDKs are generated. It exposes
    health, event ingest, the context-pack read path, and the memory/run
    inspection surfaces (list, view, version history, soft-delete, run trace).
    Direct memory create/update and the policy surface are stubbed at 501 until
    they land.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: Lore
    url: https://loregpt.ai
    email: support@loregpt.ai
servers:
  - url: http://localhost:8080
    description: Local self-host (docker compose).
tags:
  - name: system
    description: Health and diagnostics.
  - name: events
    description: Append-only event ingest.
  - name: pack
    description: Context-pack retrieval (read-your-writes).
  - name: memories
    description: Memory inspection and management (not yet implemented).
  - name: runs
    description: Run inspection (not yet implemented).
  - name: policies
    description: Access-policy management (not yet implemented).
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness and dependency health.
      description: >
        Reports the process version and the status of the database and job queue.
        Unauthenticated so orchestrators can probe it.
      tags:
        - system
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: >
            Service degraded: the database or queue is unreachable. Same body as
            200, with status "degraded" and the failing dependency marked
            "error", so orchestrators drain the instance on the status code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /v1/events:
    post:
      operationId: createEvent
      summary: Append an event to a run.
      description: >
        Appends an event to the run's append-only log and enqueues an extraction
        job in the same database transaction. Returns the created event id and
        its server-assigned, per-run sequence number.
      tags:
        - events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "202":
          description: >
            Event accepted and persisted, with its per-run sequence number
            assigned. Extraction runs asynchronously.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventResponse"
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: >
            The run does not exist, or it belongs to a different project than the
            API key. The two are indistinguishable by design — no cross-tenant
            existence signal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/pack:
    post:
      operationId: pack
      summary: Retrieve a context pack for a run.
      description: >
        Assembles a context pack for a run within the API key's project: the
        project's distilled memories (hybrid retrieval), the run's live working
        memory, and a raw tail of not-yet-distilled events, in a deterministic,
        sectioned, data-not-instructions envelope. When min_seq is given, every
        event up to it is reflected — distilled if extraction has caught up, raw
        if not — so a reader always sees a write it knows happened. The project is
        taken from the API key, never the body.
      tags:
        - pack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackRequest"
      responses:
        "200":
          description: The assembled context pack.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackResponse"
        "400":
          description: >
            Invalid request body or run_id, or a min_seq beyond the run's latest
            seq (code min_seq_out_of_range).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: >
            The run does not exist, or it belongs to a different project than the
            key (indistinguishable by design).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: >
            The project's active embedding model does not match the running
            embedder — a deployment misconfiguration (code model_mismatch). A
            project with no active model yet is NOT an error: the pack serves the
            raw tail, so read-your-writes holds from the first event.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/memories:
    get:
      operationId: listMemories
      summary: List (and optionally search) the project's memories.
      description: >
        Lists the project's currently-valid memories (soft-deleted and superseded
        rows are excluded), newest first. Optional filters narrow by kind, run,
        trust tier, and review status. When `q` is set the endpoint runs a
        lexical full-text search over memory content and returns rank-ordered
        results; it uses ONLY the lexical index, so it needs no embedding model
        and works on a deployment that has never pinned one. Browse mode (no `q`)
        is keyset-paginated via `cursor`; search mode returns the first `limit`
        results. All reads are scoped to the API key's project.
      tags: [memories]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum memories to return (capped at 200).
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: >
            Opaque keyset cursor from a previous response's `next_cursor`, for
            browse mode (ignored when `q` is set).
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: >
            Lexical full-text query over memory content. When set, results are
            rank-ordered and `next_cursor` is not returned (search returns the
            first `limit` matches).
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [working, semantic, episodic, procedural]
          description: Restrict to one memory kind.
        - name: run_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Restrict to memories distilled from events in this run.
        - name: trust_tier
          in: query
          required: false
          schema:
            type: string
          description: Restrict to one provenance trust tier (e.g. normal).
        - name: review_status
          in: query
          required: false
          schema:
            type: string
          description: Restrict to one governance review status (e.g. auto_approved).
      responses:
        "200":
          description: A page of memories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createMemory
      summary: Create a memory.
      description: Not implemented yet.
      tags: [memories]
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /v1/memories/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      operationId: getMemory
      summary: Get a memory.
      description: >
        Returns one currently-valid memory by id, scoped to the API key's
        project. A soft-deleted, superseded, or unknown id — or one belonging to
        another project — is a 404 (the same response, so a key cannot probe for
        the existence of another project's memory).
      tags: [memories]
      responses:
        "200":
          description: The memory.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No such memory in this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMemory
      summary: Update a memory.
      description: Not implemented yet.
      tags: [memories]
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
    delete:
      operationId: deleteMemory
      summary: Soft-delete a memory.
      description: >
        Soft-deletes a memory by stamping its validity window closed. The row is
        retained (its version history stays inspectable) but drops immediately
        out of retrieval, packs, and this list — a soft delete, not an erasure.
        Idempotent per live row: deleting an already-deleted, superseded, or
        unknown memory (or one in another project) is a 404. Claims previously
        distilled from the memory keep their own lifecycle. Permanent erasure and
        cascading are a separate governance flow.
      tags: [memories]
      responses:
        "204":
          description: The memory was soft-deleted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No such live memory in this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/memories/{id}/versions:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      operationId: listMemoryVersions
      summary: List a memory's version history.
      description: >
        Returns the memory's version history oldest-first — each prior version's
        content and the reason it was superseded — so a client can render a diff.
        Scoped to the API key's project; an unknown memory (or one in another
        project) is a 404.
      tags: [memories]
      responses:
        "200":
          description: The version history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryVersionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No such memory in this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/runs:
    post:
      operationId: createRun
      summary: Create a run.
      description: >
        Creates a run in the API key's project and returns its id. A run groups a
        stream of events: a client creates one, appends events to it, and packs
        context from it. The project is taken from the API key, never the body, so
        a key can only create runs in its own project. The request body is empty.
      tags:
        - runs
      responses:
        "201":
          description: Run created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRunResponse"
        "400":
          description: The request body exceeds the accepted size.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/runs/{id}/trace:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      operationId: getRunTrace
      summary: Get a run's pack trace.
      description: >
        Returns the run's context-pack history newest-first — one entry per pack
        built for the run, with the query, coverage, freshness, timing, and the
        memory ids that composed it. It is the audit substrate for reviewing what
        a run saw; comparing two entries (a diff) is a client concern. Keyset-
        paginated via `cursor`. Scoped to the API key's project; an unknown run
        (or one in another project) is a 404.
      tags: [runs]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum pack entries to return (capped at 200).
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque keyset cursor from a previous response's `next_cursor`.
      responses:
        "200":
          description: A page of pack-trace entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunTraceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No such run in this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/policies:
    get:
      operationId: listPolicies
      summary: List access policies.
      description: Not implemented yet.
      tags: [policies]
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API key sent as a bearer token: `Authorization: Bearer <key>`."
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    NotImplemented:
      description: Not implemented yet.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: >-
        A malformed request parameter — an invalid id, limit, cursor, or filter
        value. The code names which (invalid_id, invalid_limit, invalid_cursor,
        invalid_run_id).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Health:
      type: object
      required:
        - status
        - version
        - db
        - queue
        - workmem
        - embedder
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.0.0-dev
        db:
          type: string
          example: ok
        queue:
          type: string
          example: ok
        workmem:
          type: string
          description: >-
            Working-memory stripe mode. Reported for visibility only; it never
            affects status, since the stripe is optional and the durable store
            stays authoritative.
          enum: [ok, degraded, disabled]
          example: disabled
        embedder:
          type: string
          description: >-
            Composed embedding model identity (model@dim). Reported so an
            operator can confirm the server and worker share one vector space;
            it never affects status.
          example: fixture-embed-v1@64
    CreateEventRequest:
      type: object
      required:
        - run_id
        - agent_id
        - payload
      properties:
        run_id:
          type: string
          format: uuid
        agent_id:
          type: string
          minLength: 1
          example: researcher
        payload:
          type: object
          additionalProperties: true
          description: >-
            Opaque event body. As a convention, an event with `kind: "state"`
            carries one hot coordination fact for working memory and is written
            through to the low-latency stripe so a same-run reader sees it
            immediately: `{"kind":"state","entity":"<subject>","predicate":"<attr>","value":<any JSON>}`.
            entity and predicate are required, non-empty, at most 256 bytes, and
            free of control characters; value is bounded by the server's
            configured limit. A malformed state fact is rejected with 400
            invalid_state_fact. Any other payload is stored and distilled by the
            normal extraction path.
          example:
            kind: state
            entity: auth-service
            predicate: status
            value: up
    CreateEventResponse:
      type: object
      required:
        - event_id
        - seq
      properties:
        event_id:
          type: string
          format: uuid
        seq:
          type: integer
          format: int64
          minimum: 1
          description: >
            Server-assigned sequence number within the run. Monotonic and
            gap-free per run; clients carry it as the min_seq of a later /v1/pack
            to assert read-your-writes.
          example: 1
    CreateRunResponse:
      type: object
      required:
        - run_id
        - created_at
      properties:
        run_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
    PackRequest:
      type: object
      required:
        - run_id
        - query
      properties:
        run_id:
          type: string
          format: uuid
        query:
          type: string
          description: Free-text retrieval query.
        min_seq:
          type: integer
          format: int64
          minimum: 0
          default: 0
          description: >
            Read-your-writes barrier: the run seq the caller must see. 0 (the
            default) asserts nothing. Events in (covered_seq, min_seq] are always
            included in the raw tail. A min_seq beyond the run's latest seq is a
            400 (min_seq_out_of_range).
        scopes:
          type: array
          items:
            type: string
          description: >
            Scope filter over the project's memories: a memory in any listed scope
            is eligible; an empty or omitted list is project-wide. This is the
            access-scope hook — today a plain scope-key overlap; per-agent policy
            resolution lands later.
        limit:
          type: integer
          minimum: 1
          description: Maximum distilled memories to retrieve (server default when omitted).
        token_budget:
          type: integer
          minimum: 0
          description: >
            Coarse cap on the pack's distilled recall; whole memories are dropped
            once the estimate exceeds it. 0 (the default) is unbounded. The
            working section and the read-your-writes window are never dropped.
    PackResponse:
      type: object
      required:
        - text
        - sources
        - covered_seq
        - freshness_lag_ms
        - saved_tokens
        - working_source
        - truncated
      properties:
        text:
          type: string
          description: The assembled, sectioned, data-not-instructions pack.
        sources:
          type: array
          items:
            $ref: "#/components/schemas/PackSource"
          description: The distilled memories that composed the pack, in pack order.
        covered_seq:
          type: integer
          format: int64
          description: The run's extraction checkpoint — every event at or below it is distilled.
        freshness_lag_ms:
          type: integer
          format: int64
          description: >
            Age in milliseconds of the OLDEST not-yet-distilled event (how far
            behind the distilled view is); 0 when the run is fully caught up.
        saved_tokens:
          type: integer
          description: >
            Estimated tokens saved by packing — a coarse v0 char-based estimate,
            not a metered figure.
        working_source:
          type: string
          enum: [live, durable, skipped]
          description: >
            Where the working section came from: the live stripe, a durable
            fallback, or skipped (a healthy stripe that failed this read).
        truncated:
          type: boolean
          description: >
            True when the pack omitted content that existed — the raw tail beyond
            the guaranteed window was capped, or a token budget dropped memories.
    PackSource:
      type: object
      required:
        - id
        - kind
        - score
        - section
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          description: Memory kind (working, semantic, episodic, procedural).
        score:
          type: number
          format: double
          description: Fused reciprocal-rank score (higher is more relevant).
        section:
          type: string
          description: The pack section the memory appears in.
    Memory:
      type: object
      required:
        - id
        - kind
        - content
        - created_by_agent
        - created_at
        - version
        - trust_tier
        - review_status
        - scope_keys
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          description: Memory kind (working, semantic, episodic, procedural).
        content:
          type: string
          description: The memory's current content.
        created_by_agent:
          type: string
          description: The agent whose event this memory was distilled from.
        created_at:
          type: string
          format: date-time
          description: When the memory was created.
        version:
          type: integer
          minimum: 1
          description: Current version; increments each time the memory is superseded.
        trust_tier:
          type: string
          description: Provenance trust tier (e.g. normal).
        review_status:
          type: string
          description: Governance review status (e.g. auto_approved).
        scope_keys:
          type: array
          items:
            type: string
          description: Access-scope keys the memory is visible under (empty = project-wide).
        source_event_id:
          type: string
          format: uuid
          nullable: true
          description: >-
            The source event this memory was distilled from; null when there is no live source
            event — either it was not extracted from an event, or that event has since expired.
        run_id:
          type: string
          format: uuid
          nullable: true
          description: >-
            The run whose event this memory was distilled from (via its source event); null under
            the same condition as source_event_id (no live source event).
    MemoryListResponse:
      type: object
      required:
        - memories
        - has_more
      properties:
        memories:
          type: array
          items:
            $ref: "#/components/schemas/Memory"
        has_more:
          type: boolean
          description: Whether more results exist beyond this page.
        next_cursor:
          type: string
          nullable: true
          description: >
            Opaque cursor for the next browse page; absent in search mode (q) and
            when there are no more results.
    MemoryVersion:
      type: object
      required:
        - version
        - content
        - created_at
      properties:
        version:
          type: integer
          minimum: 1
          description: The version number this history entry captures.
        content:
          type: string
          description: The content at this version.
        changed_by:
          type: string
          nullable: true
          description: What changed the memory to the next version (an agent or a policy).
        reason:
          type: string
          nullable: true
          description: Why this version was superseded by the next.
        created_at:
          type: string
          format: date-time
    MemoryVersionListResponse:
      type: object
      required:
        - versions
      properties:
        versions:
          type: array
          items:
            $ref: "#/components/schemas/MemoryVersion"
          description: Version history, oldest first.
    RunTraceEntry:
      type: object
      required:
        - id
        - created_at
        - query
        - memory_ids
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        query:
          type: string
          description: The retrieval query the pack was built for.
        covered_seq:
          type: integer
          format: int64
          nullable: true
          description: The run's extraction checkpoint at pack time.
        freshness_lag_ms:
          type: integer
          format: int64
          nullable: true
          description: Age (ms) of the oldest not-yet-distilled event at pack time.
        latency_ms:
          type: integer
          nullable: true
          description: Server-side pack build time.
        memory_ids:
          type: array
          items:
            type: string
            format: uuid
          description: The memories that composed the pack, in pack order.
        pack_hash:
          type: string
          nullable: true
          description: Byte-stable digest of the pack, when computed (else null).
    RunTraceResponse:
      type: object
      required:
        - packs
        - has_more
      properties:
        packs:
          type: array
          items:
            $ref: "#/components/schemas/RunTraceEntry"
        has_more:
          type: boolean
          description: Whether more entries exist beyond this page.
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; absent when there are no more results.
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        code:
          type: string
