# Polyglot CI: one leg per language in the monorepo, plus a hygiene grep.
# Secret scanning lives in the separate security.yml (gitleaks) — not duplicated here.
# Later phase-0 increments add spec-lint, docker-build, and import-smoke jobs.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: go (vet · lint · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go vet ./...
      - name: golangci-lint (v2, zero-tolerance — see .golangci.yml)
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run ./...
      - run: go test ./...

  typescript:
    name: typescript (@loregpt/sdk)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Placeholder package: no committed lockfile yet, so a non-frozen install.
      # Switches to `--frozen-lockfile` when the real SDK lands in phase 1.
      - run: pnpm install
      - name: type=module syntax check
        run: node --check index.js

  python:
    name: python (loregpt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.26"
      - run: uv sync
      - name: ruff
        run: uvx ruff@0.14.4 check .

  integration:
    name: integration (testcontainers · ParadeDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      # ubuntu-latest ships a working Docker engine; testcontainers-go drives it
      # to spin a real ParadeDB and prove migrations + extensions + queries.
      #
      # Pre-pull the image once (with retry) before the tests. `go test ./...` runs
      # packages in parallel, so several would otherwise each start a container and
      # race to pull from Docker Hub, which intermittently rate-limits/times out
      # anonymous pulls on shared CI IPs. Pulling once seeds the local cache so the
      # parallel packages reuse it instead of hammering the registry.
      - name: Pre-pull ParadeDB image (retry to absorb Docker Hub flakes)
        run: |
          img="paradedb/paradedb:0.24.2-pg17" # keep in lockstep with infra/docker-compose.yml
          for attempt in 1 2 3 4 5; do
            if docker pull "$img"; then exit 0; fi
            echo "pull attempt ${attempt} failed; retrying in $((attempt * 10))s"
            sleep "$((attempt * 10))"
          done
          echo "::error::failed to pull ${img} after 5 attempts"
          exit 1
      - run: go test -tags=integration ./...

  forbidden-strings:
    name: forbidden-strings (criterion 7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Fails if the placeholder token or the rejected product name leaks into the
      # tree. The [x] character classes keep this pattern from matching its own
      # source line, so every file — including this workflow — is scanned.
      - name: no placeholder / rejected-name strings
        run: |
          if git grep -nEi '<[p]roje>|m[a]estro'; then
            echo "::error::forbidden string found (see matches above)"
            exit 1
          fi
          echo "clean: no forbidden strings"

  spec-lint:
    name: spec-lint (openapi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Redocly reads redocly.yaml at the repo root for the ruleset.
      - run: npx --yes @redocly/cli@2.38.0 lint spec/openapi.yaml

  docker-build:
    name: docker-build (image size · criterion 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build distroless image
        run: docker build -t lore:ci .
      - name: assert image under 30 MB
        run: |
          size=$(docker image inspect lore:ci --format '{{.Size}}')
          limit=$((30 * 1024 * 1024))
          echo "image size: ${size} bytes (limit ${limit} bytes / 30 MB)"
          if [ "$size" -gt "$limit" ]; then
            echo "::error::image exceeds the 30 MB budget (${size} > ${limit})"
            exit 1
          fi
          echo "ok: image within the 30 MB budget"
      - name: validate compose file
        run: docker compose -f infra/docker-compose.yml config --quiet

  import-smoke:
    name: import-smoke (open-core surface · criterion 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      # A throwaway module outside this repo imports core/httpapi + core/ext and
      # builds, while server/internal stays unimportable (ADR-014).
      - run: bash scripts/import-smoke.sh
