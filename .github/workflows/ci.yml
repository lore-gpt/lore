# Polyglot CI: one leg per language in the monorepo, plus a hygiene grep.
# Secret scanning lives in the separate security.yml (gitleaks) — not duplicated here.
# Later phase-0 increments add spec-lint, docker-build, and import-smoke jobs.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: go (vet · lint · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - run: go vet ./...
      - name: golangci-lint (v2, zero-tolerance — see .golangci.yml)
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run ./...
      - run: go test ./...

  tenant-lint:
    name: tenant-lint (project_id required · first isolation belt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      # First belt of tenant isolation: a query touching a tenant table must filter by
      # project_id (or carry a justified -- lore:tenant-exempt marker). RLS is the runtime
      # backstop; this catches the omission at build time.
      - run: go run ./scripts/sqlc-tenant-lint

  typescript:
    name: typescript (@loregpt/sdk)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/typescript
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: clients/typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Regenerate the committed OpenAPI types and fail if the spec drifted without a regen.
      - name: gen drift check
        run: pnpm gen:check
      # Type-check the library, the node:test files, the content-XOR-payload negative assertions,
      # and the hero example (native type-stripping runs tests but does NOT type-check them).
      - name: typecheck
        run: pnpm typecheck
      # Unit tests via node:test on the .ts sources directly (node 22 type-stripping); no test-runner dep.
      - name: test
        run: pnpm test
      # The README hero snippet must stay byte-identical to the type-checked examples/hero.ts.
      - name: readme hero example matches
        run: pnpm example

  mcp:
    name: mcp (@loregpt/mcp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/mcp
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: clients/mcp/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Regenerate the committed OpenAPI types and fail if the spec drifted without a regen.
      - name: gen drift check
        run: pnpm gen:check
      # Type-check the server, the REST client, and the node:test files.
      - name: typecheck
        run: pnpm typecheck
      # Tool round-trip + error-mapping tests via node:test (node 22 type-stripping); no test-runner dep.
      - name: test
        run: pnpm test
      # The published server must build to runnable ESM (the lore-mcp bin included).
      - name: build
        run: pnpm build

  inspector:
    name: inspector (@loregpt/inspector)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inspector
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: inspector/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Regenerate the committed OpenAPI types and fail if the spec drifted without a regen.
      - name: gen drift check
        run: pnpm gen:check
      # Biome lint + format check.
      - name: check
        run: pnpm check
      # Type-check and build the standalone Next.js app.
      - name: build
        run: pnpm build

  python:
    name: python (loregpt)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # The requires-python floor plus a current release, so the floor is proof, not a claim.
        python-version: ["3.10", "3.13"]
    defaults:
      run:
        working-directory: clients/python
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.26"
          python-version: ${{ matrix.python-version }}
      # Installs the one runtime dep (httpx) + the PEP 735 dev group (codegen, mypy, pytest).
      - run: uv sync
      # Regenerate the committed wire types and fail if the spec drifted without a regen.
      - name: gen drift check
        run: |
          uv run datamodel-codegen --input ../../spec/openapi.yaml --input-file-type openapi --output-model-type typing.TypedDict --output loregpt/_generated/wire.py --target-python-version 3.10 --use-standard-collections --use-union-operator --use-schema-description --disable-timestamp --custom-file-header "# @generated by datamodel-codegen from spec/openapi.yaml. DO NOT EDIT. Regenerate: task sdk:py:gen"
          git diff --exit-code -- loregpt/_generated/wire.py
      # Strict type-check of the library, the tests, and examples/hero.py — the gate that makes the README hero real.
      - name: mypy (strict)
        run: uv run mypy
      # Unit tests (sync + async) via pytest.
      - name: test
        run: uv run pytest
      # The README hero python block must stay byte-identical to the type-checked examples/hero.py.
      - name: readme hero example matches
        run: uv run python scripts/check_readme_hero.py
      - name: ruff
        run: uvx ruff@0.14.4 check .

  integration:
    name: integration (testcontainers · ParadeDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      # ubuntu-latest ships a working Docker engine; testcontainers-go drives it
      # to spin a real ParadeDB and prove migrations + extensions + queries.
      #
      # Pre-pull the image once (with retry) before the tests. `go test ./...` runs
      # packages in parallel, so several would otherwise each start a container and
      # race to pull from Docker Hub, which intermittently rate-limits/times out
      # anonymous pulls on shared CI IPs. Pulling once seeds the local cache so the
      # parallel packages reuse it instead of hammering the registry.
      - name: Pre-pull ParadeDB image (retry to absorb Docker Hub flakes)
        run: |
          img="paradedb/paradedb:0.24.2-pg17" # keep in lockstep with infra/docker-compose.yml
          for attempt in 1 2 3 4 5; do
            if docker pull "$img"; then exit 0; fi
            echo "pull attempt ${attempt} failed; retrying in $((attempt * 10))s"
            sleep "$((attempt * 10))"
          done
          echo "::error::failed to pull ${img} after 5 attempts"
          exit 1
      - run: go test -tags=integration ./...

  forbidden-strings:
    name: forbidden-strings (criterion 7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Fails if the placeholder token or the rejected product name leaks into the
      # tree. The [x] character classes keep this pattern from matching its own
      # source line, so every file — including this workflow — is scanned.
      - name: no placeholder / rejected-name strings
        run: |
          if git grep -nEi '<[p]roje>|m[a]estro'; then
            echo "::error::forbidden string found (see matches above)"
            exit 1
          fi
          echo "clean: no forbidden strings"

  spec-lint:
    name: spec-lint (openapi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      # The redocly ruleset lives next to the spec (spec/redocly.yaml).
      - run: npx --yes @redocly/cli@2.38.0 lint --config spec/redocly.yaml spec/openapi.yaml

  docker-build:
    name: docker-build (image size · criterion 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: build distroless image
        run: docker build -f infra/Dockerfile -t lore:ci .
      # Budget for the single static distroless binary. It is a realistic ceiling for the full server —
      # Postgres (pgx), the River queue, the Valkey client, the extraction SDK, and Prometheus metrics —
      # not a hard product target; it exists to catch an unexpected dependency bloating the image, and is
      # raised deliberately when the feature set genuinely grows.
      - name: assert image under 45 MB
        run: |
          size=$(docker image inspect lore:ci --format '{{.Size}}')
          limit=$((45 * 1024 * 1024))
          echo "image size: ${size} bytes (limit ${limit} bytes / 45 MB)"
          if [ "$size" -gt "$limit" ]; then
            echo "::error::image exceeds the 45 MB budget (${size} > ${limit})"
            exit 1
          fi
          echo "ok: image within the 45 MB budget"
      - name: validate compose file
        run: docker compose -f infra/docker-compose.yml config --quiet

  import-smoke:
    name: import-smoke (open-core surface · criterion 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      # A throwaway module outside this repo imports core/httpapi + core/ext and
      # builds, while server/internal stays unimportable — the open-core boundary.
      - run: bash scripts/import-smoke.sh
