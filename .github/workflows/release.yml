name: release

# Build and publish the server container image on a version tag. The image is
# multi-arch (linux/amd64 + linux/arm64), cross-compiled without QEMU (the
# Dockerfile builds on the native builder and sets GOARCH), and the git tag is
# injected into the binary version via -ldflags.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/lore-gpt/lore
  INSPECTOR_IMAGE: ghcr.io/lore-gpt/lore-inspector
  # Size budget for the Node/Next standalone inspector image (uncompressed, as CI/Linux reports it). Measured
  # ~354 MB at introduction; set with margin and raised deliberately when the bundle genuinely grows.
  INSPECTOR_IMAGE_MB: "500"

jobs:
  image:
    name: publish image (ghcr)
    runs-on: ubuntu-latest
    # Publish the server image only after the inspector image has FULLY published (build + push + smoke + size).
    # `lore init` runs from THIS server image and pins the default-on compose to the matching
    # lore-inspector:<tag>, so a server image must never ship for a tag whose inspector image is missing — a
    # half-release would make `docker compose up` fail to pull the inspector. Gating this way makes the only
    # reachable partial state "inspector published, server not", which is harmless (no server image ⇒ no one
    # runs `init` for that tag ⇒ nothing references the orphan inspector).
    needs: inspector-image
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag the image with the literal git tag (e.g. v0.0.1) so the image tag
      # matches the binary's core.Version exactly — `lore init` pins the generated
      # compose to that tag, so the two can never drift. Also publish `latest`.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}

      # Smoke: the published image must report the tag as its version (proves the
      # ldflags injection worked and no "0.0.0-dev" shipped).
      - name: Verify published version
        run: |
          got="$(docker run --rm "${IMAGE}:${GITHUB_REF_NAME}" version)"
          if [ "$got" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::published image reports version '$got', expected '${GITHUB_REF_NAME}'"
            exit 1
          fi
          echo "published ${IMAGE}:${GITHUB_REF_NAME} reports version $got"

  inspector-image:
    name: publish inspector image (ghcr)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The Inspector releases in lockstep with the server image on the same v* tag — a SEPARATE package
      # (ghcr.io/lore-gpt/lore-inspector), no independent version counter — so `lore init` can pin both to one
      # version. Multi-arch, built once on the native runner (the Dockerfile's --platform=$BUILDPLATFORM build
      # stage emits arch-independent JS), so no QEMU.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.INSPECTOR_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./inspector
          file: inspector/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Smoke: both architectures must be present in the pushed manifest, and the amd64 image must actually boot
      # and serve its liveness route (/api/health needs no backend). arm64 is verified by manifest presence only
      # (no QEMU run).
      - name: Verify published image
        run: |
          set -euo pipefail
          IMG="${INSPECTOR_IMAGE}:${GITHUB_REF_NAME}"
          for arch in amd64 arm64; do
            if ! docker buildx imagetools inspect "$IMG" | grep -q "linux/${arch}"; then
              echo "::error::published inspector image is missing linux/${arch}"
              exit 1
            fi
          done
          docker run -d --name inspector-smoke -p 3000:3000 --platform linux/amd64 "$IMG"
          ok=""
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          docker logs inspector-smoke || true
          docker rm -f inspector-smoke >/dev/null 2>&1 || true
          if [ -z "$ok" ]; then
            echo "::error::inspector image did not become healthy on /api/health"
            exit 1
          fi
          echo "published ${IMG}: amd64 + arm64 manifests present, amd64 /api/health OK"

      # Size budget (amd64 reference — the one arch we measure; cross-arch deltas are noise to the threshold).
      - name: Assert image size budget
        run: |
          set -euo pipefail
          size=$(docker image inspect "${INSPECTOR_IMAGE}:${GITHUB_REF_NAME}" --format '{{.Size}}')
          limit=$(( INSPECTOR_IMAGE_MB * 1024 * 1024 ))
          echo "inspector image size: ${size} bytes (limit ${limit} / ${INSPECTOR_IMAGE_MB} MB)"
          if [ "$size" -gt "$limit" ]; then
            echo "::error::inspector image exceeds the ${INSPECTOR_IMAGE_MB} MB budget (${size} > ${limit})"
            exit 1
          fi
          echo "ok: inspector image within the ${INSPECTOR_IMAGE_MB} MB budget"
