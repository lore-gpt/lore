name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secret + cloud-boundary scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so secrets in any commit are caught
      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan for secrets
        # Runs the open-source gitleaks binary directly (no GITLEAKS_LICENSE needed for orgs,
        # unlike gitleaks-action). Config: .gitleaks.toml. Non-zero exit = leak found.
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose
