name: release-sdk

# Publish the TypeScript SDK (@loregpt/sdk -> npm) and the Python SDK (loregpt -> PyPI) from a `sdk-v*` tag.
#
# SDK releases are versioned INDEPENDENTLY of the server image (which releases on `v*`). The two tag globs are
# disjoint — `v*` never matches `sdk-v0.1.0` (it starts with `s`), and `sdk-v*` never matches `v0.0.1` — so
# tagging one release train never triggers the other. Both SDKs publish together, in lockstep, at the tag's
# version.
#
# Identity is OIDC TRUSTED PUBLISHING — no long-lived registry token lives in the repo (the same zero-external-
# secret principle as the GHCR image release). A maintainer configures the trusted publishers once; see
# .github/CONTRIBUTING.md "Releasing the SDKs" for the exact values.
#
# Safety: the `build` job re-runs every CI check AND verifies the tag matches both package versions, then the
# `publish` job waits in the protected `release` environment (required reviewer) — an irreversible publish is
# never automatic, and the approval screen shows exactly what will ship (names, version, spec commit, files).

on:
  push:
    tags: ["sdk-v*"]

permissions:
  contents: read

jobs:
  build:
    name: build + verify (gate)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      # Version truth = the tag, verified against both committed package versions. A mismatch fails loud, so a
      # declared-vs-tagged drift can never be published silently (bump both packages to X.Y.Z before tagging
      # sdk-vX.Y.Z).
      - name: Verify tag == package.json == pyproject
        id: ver
        run: |
          version="${GITHUB_REF_NAME#sdk-v}"
          ts=$(jq -r .version clients/typescript/package.json)
          py=$(sed -nE 's/^version = "(.*)"/\1/p' clients/python/pyproject.toml | head -1)
          echo "tag=$version  package.json=$ts  pyproject=$py"
          if [ "$ts" != "$version" ] || [ "$py" != "$version" ]; then
            echo "::error::version mismatch — tag sdk-v$version but package.json=$ts, pyproject=$py. Bump both to $version and re-tag."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # --- TypeScript: the full CI mirror + build ---
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: clients/typescript/pnpm-lock.yaml
      - name: TS check + build
        working-directory: clients/typescript
        run: |
          pnpm install --frozen-lockfile
          pnpm gen:check   # spec anti-drift: regen the wire types and fail if they drifted
          pnpm typecheck
          pnpm test
          pnpm example
          pnpm build

      # --- Python: the full CI mirror + build ---
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.26"
          python-version: "3.13"
      - name: Py check + build
        working-directory: clients/python
        run: |
          uv sync
          uv run datamodel-codegen --input ../../spec/openapi.yaml --input-file-type openapi --output-model-type typing.TypedDict --output loregpt/_generated/wire.py --target-python-version 3.10 --use-standard-collections --use-union-operator --use-schema-description --disable-timestamp --custom-file-header "# @generated by datamodel-codegen from spec/openapi.yaml. DO NOT EDIT. Regenerate: task sdk:py:gen"
          git diff --exit-code -- loregpt/_generated/wire.py   # spec anti-drift
          uv run mypy
          uv run pytest
          uv run python scripts/check_readme_hero.py
          uvx ruff@0.14.4 check .
          uv build

      # The approval screen must not be blind: record exactly what will publish.
      - name: Publish plan (approval summary)
        run: |
          version="${{ steps.ver.outputs.version }}"
          spec_commit=$(git log -1 --format=%H -- spec/openapi.yaml)
          {
            echo "## SDK release plan — sdk-v${version}"
            echo ""
            echo "| package | version | registry |"
            echo "| --- | --- | --- |"
            echo "| \`@loregpt/sdk\` | ${version} | npm |"
            echo "| \`loregpt\` | ${version} | PyPI |"
            echo ""
            echo "Generated wire types are in lockstep with spec commit \`${spec_commit}\`."
            echo ""
            echo "### npm package contents (\`npm pack --dry-run\`)"
            echo '```'
            (cd clients/typescript && npm pack --dry-run 2>&1 || true)
            echo '```'
            echo "### Python distributions"
            echo '```'
            ls -1 clients/python/dist
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: publish (npm + PyPI)
    needs: build
    runs-on: ubuntu-latest
    # Protected environment with a required reviewer — the irreversible publish waits for an explicit approval.
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC — ONLY this job: npm provenance + PyPI trusted publishing, no stored token
    steps:
      - uses: actions/checkout@v5

      # --- npm: OIDC trusted publishing (no token; provenance is automatic) ---
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          # Points npm at the public registry for the OIDC exchange. NODE_AUTH_TOKEN is deliberately NOT set —
          # trusted publishing mints a short-lived credential from the id-token instead.
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: clients/typescript/pnpm-lock.yaml
      - name: Publish @loregpt/sdk to npm
        working-directory: clients/typescript
        run: |
          npm install -g npm@latest   # OIDC trusted publishing needs npm >= 11.5.1 (Node 22 ships npm 10.x)
          pnpm install --frozen-lockfile
          pnpm build
          # No --provenance flag: trusted publishing generates + publishes provenance automatically.
          npm publish --access public

      # --- PyPI: OIDC trusted publishing ---
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.26"
          python-version: "3.13"
      - name: Build loregpt
        working-directory: clients/python
        run: uv build
      - name: Publish loregpt to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist

  smoke:
    name: post-publish smoke (install from registry)
    needs: [build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: npm install + construct (retry for propagation)
        run: |
          version="${{ needs.build.outputs.version }}"
          mkdir /tmp/npm-smoke && cd /tmp/npm-smoke && npm init -y >/dev/null
          for attempt in 1 2 3 4 5 6; do
            if npm install "@loregpt/sdk@${version}"; then break; fi
            echo "npm not propagated yet (attempt ${attempt}); waiting…"; sleep 20
          done
          node --input-type=module -e "import { LoreClient } from '@loregpt/sdk'; new LoreClient({ apiKey: 'smoke' }); console.log('npm import + construct ok');"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: pip install + construct (retry for propagation)
        run: |
          version="${{ needs.build.outputs.version }}"
          for attempt in 1 2 3 4 5 6; do
            if pip install "loregpt==${version}"; then break; fi
            echo "PyPI not propagated yet (attempt ${attempt}); waiting…"; sleep 20
          done
          python -c "from loregpt import LoreClient; LoreClient(api_key='smoke'); print('pypi import + construct ok')"
