# Developer entry point. Task runs commands through its own embedded POSIX-sh
# interpreter, so these behave the same on Windows, macOS, and Linux — only the
# native tools (go, pnpm, uv, docker, npx) need to be on PATH. CI invokes those
# tools directly; this file is the human-facing convenience layer.
version: "3"

silent: true

vars:
  BIN: bin/lore
  MAIN_PKG: ./server/cmd/lore
  COMPOSE: infra/docker-compose.yml
  TS_DIR: clients/typescript
  PY_DIR: clients/python
  MCP_DIR: clients/mcp
  IMAGE: ghcr.io/lore-gpt/lore
  GOLANGCI_VERSION: v2.12.2
  SQLC_VERSION: v1.31.1
  REDOCLY_VERSION: 2.38.0

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list

  setup:
    desc: Install dev dependencies (Go tools + JS/Py deps).
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_VERSION}}
      - go install github.com/sqlc-dev/sqlc/cmd/sqlc@{{.SQLC_VERSION}}
      - go mod download
      - cd clients/typescript && pnpm install
      - cd clients/python && uv sync
      - cd clients/mcp && pnpm install

  sqlc:
    desc: Regenerate typed DB access code from SQL.
    cmds:
      - sqlc generate

  lint:
    desc: Lint Go (golangci-lint; includes gofmt).
    cmds:
      - golangci-lint run ./...

  lint:tenant:
    desc: Fail if a tenant query omits a project_id filter (first isolation belt).
    cmds:
      - go run ./scripts/sqlc-tenant-lint

  test:
    desc: Run unit tests.
    cmds:
      - go test ./...

  test:integration:
    desc: Run integration tests (needs Docker; spins ParadeDB via testcontainers).
    cmds:
      - go test -tags=integration ./...

  build:
    desc: Build the lore binary into bin/.
    cmds:
      - go build -o {{.BIN}} {{.MAIN_PKG}}

  spec:lint:
    desc: Lint the OpenAPI spec (redocly).
    cmds:
      - npx --yes @redocly/cli@{{.REDOCLY_VERSION}} lint --config spec/redocly.yaml spec/openapi.yaml

  image:build:
    desc: Build the server container image locally (single-arch), tagged :dev, with a dev version.
    cmds:
      - docker build -f infra/Dockerfile --build-arg VERSION=dev -t {{.IMAGE}}:dev .

  sdk:gen:
    desc: Regenerate the committed TS SDK types from the OpenAPI spec (commit the result).
    cmds:
      - cd {{.TS_DIR}} && pnpm run gen

  sdk:build:
    desc: Type-check and build the TS SDK (tsc, ESM — dist/*.js + *.d.ts).
    cmds:
      - cd {{.TS_DIR}} && pnpm install && pnpm run build

  sdk:test:
    desc: Run the TS SDK checks (gen-drift, typecheck, node:test, README-hero example) — mirrors CI.
    cmds:
      - cd {{.TS_DIR}} && pnpm install && pnpm run check

  sdk:py:gen:
    desc: Regenerate the committed Python SDK wire types from the OpenAPI spec (commit the result).
    cmds:
      - cd {{.PY_DIR}} && uv run datamodel-codegen --input ../../spec/openapi.yaml --input-file-type openapi --output-model-type typing.TypedDict --output loregpt/_generated/wire.py --target-python-version 3.10 --use-standard-collections --use-union-operator --use-schema-description --disable-timestamp --custom-file-header "# @generated by datamodel-codegen from spec/openapi.yaml. DO NOT EDIT. Regenerate: task sdk:py:gen"

  sdk:py:test:
    desc: Run the Python SDK checks (gen-drift, mypy --strict, pytest, README-hero example, ruff) — mirrors CI.
    cmds:
      - cd {{.PY_DIR}} && uv sync
      - cd {{.PY_DIR}} && uv run datamodel-codegen --input ../../spec/openapi.yaml --input-file-type openapi --output-model-type typing.TypedDict --output loregpt/_generated/wire.py --target-python-version 3.10 --use-standard-collections --use-union-operator --use-schema-description --disable-timestamp --custom-file-header "# @generated by datamodel-codegen from spec/openapi.yaml. DO NOT EDIT. Regenerate: task sdk:py:gen"
      - cd {{.PY_DIR}} && git diff --exit-code -- loregpt/_generated/wire.py
      - cd {{.PY_DIR}} && uv run mypy
      - cd {{.PY_DIR}} && uv run pytest
      - cd {{.PY_DIR}} && uv run python scripts/check_readme_hero.py
      - cd {{.PY_DIR}} && uvx ruff@0.14.4 check .

  mcp:gen:
    desc: Regenerate the committed MCP-server wire types from the OpenAPI spec (commit the result).
    cmds:
      - cd {{.MCP_DIR}} && pnpm run gen

  mcp:build:
    desc: Type-check and build the MCP server (tsc, ESM — dist/*.js incl. the lore-mcp bin).
    cmds:
      - cd {{.MCP_DIR}} && pnpm install && pnpm run build

  mcp:test:
    desc: Run the MCP-server checks (gen-drift, typecheck, node:test) — mirrors CI.
    cmds:
      - cd {{.MCP_DIR}} && pnpm install && pnpm run check

  evals:test:
    desc: Run the LongMemEval harness checks (mypy --strict, pytest, ruff, keyless smoke dry-run) — mirrors CI.
    cmds:
      - cd evals && uv sync
      - cd evals && uv run mypy
      - cd evals && uv run pytest
      - cd evals && uvx ruff@0.14.4 check .
      - cd evals && uv run python -m examples.smoke --dry-run --split fixture --n 3 --systems lore,mem0 --batch --pipeline

  compose:up:
    desc: Start the local stack (ParadeDB, Valkey, MinIO, server, worker), provision a first project, and wait until healthy.
    cmds:
      - docker compose -f {{.COMPOSE}} up -d --wait

  compose:down:
    desc: Stop the local stack and remove its volumes.
    cmds:
      - docker compose -f {{.COMPOSE}} down -v
