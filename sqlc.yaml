version: "2"
sql:
  - engine: "postgresql"
    schema: "core/store/migrations"
    queries: "core/store/queries"
    # The Phase 0 inline `memories.embedding` column was dropped in migration 0002;
    # embeddings relocate to a dedicated `embeddings(vector)` table in a later Phase 1
    # migration, at which point sqlc's native pgvector mapping (vector ->
    # github.com/pgvector/pgvector-go) applies to that table instead.
    gen:
      go:
        package: "db"
        out: "core/store/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
