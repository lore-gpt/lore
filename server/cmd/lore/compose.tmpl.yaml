# Local self-host topology for Lore, pinned to a published image.
#
#   docker compose up --wait
#
# `--wait` returns once the server is healthy: paradedb accepting TCP, the schema
# migrated (serve --auto-migrate), and /healthz green. The worker starts only
# after the server is healthy (so the queue schema exists) and, like every
# service, restarts on failure — but it has no HTTP surface, so `--wait` does not
# gate on the worker independently. valkey and minio are started so the Phase 1
# topology is already in place.
#
# lore-provision is a one-shot that runs after the server is healthy: it creates a
# first project and writes its id and API key to ./.lore/credentials (0600) so the
# quickstart is `up` then `cat ./.lore/credentials`, no hand-run SQL. It is
# idempotent — a second `up` finds the file and leaves the project untouched — and
# it never prints the token, so the secret stays out of the logs.
#
# Generated by `lore init`; re-run `lore init > docker-compose.yml` to refresh.
# The database credentials below are throwaway local-dev values, not secrets.
name: lore

services:
  paradedb:
    image: paradedb/paradedb:0.24.2-pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: lore
      POSTGRES_PASSWORD: lore
      POSTGRES_DB: lore
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U lore -d lore"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s
    volumes:
      - paradedb-data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8.1-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: ["server", "/data"]
    environment:
      MINIO_ROOT_USER: lore
      MINIO_ROOT_PASSWORD: lore-local-dev
    volumes:
      - minio-data:/data

  lore-server:
    restart: unless-stopped
    image: {{ .Image }}
    command: ["serve", "--auto-migrate"]
    environment:
      LORE_DATABASE_URL: postgres://lore:lore@paradedb:5432/lore?sslmode=disable
      LORE_ADDR: ":8080"
      LORE_VALKEY_URL: redis://valkey:6379
      # Embeddings default to the offline fixture. To enable semantic recall, export
      # LORE_EMBEDDING_* before `up`; the SAME values are passed to the worker below
      # so the query and the stored vectors share one vector space.
      LORE_EMBEDDING_PROVIDER: "${LORE_EMBEDDING_PROVIDER:-}"
      LORE_EMBEDDING_BASE_URL: "${LORE_EMBEDDING_BASE_URL:-}"
      LORE_EMBEDDING_MODEL: "${LORE_EMBEDDING_MODEL:-}"
      LORE_EMBEDDING_DIM: "${LORE_EMBEDDING_DIM:-}"
      LORE_EMBEDDING_SEND_DIMENSIONS: "${LORE_EMBEDDING_SEND_DIMENSIONS:-}"
      LORE_EMBEDDING_API_KEY: "${LORE_EMBEDDING_API_KEY:-}"
      # OpenTelemetry traces are off unless LORE_OTEL_ENABLED=true AND an OTLP endpoint
      # is set; export both before `up` to ship traces to a collector.
      LORE_OTEL_ENABLED: "${LORE_OTEL_ENABLED:-}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
    ports:
      # The container always listens on 8080; the host port is overridable via
      # LORE_HTTP_PORT for when 8080 is already taken (e.g. a local Apache/nginx).
      - "${LORE_HTTP_PORT:-8080}:8080"
    depends_on:
      paradedb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/lore", "health"]
      interval: 3s
      timeout: 3s
      retries: 20

  lore-worker:
    restart: unless-stopped
    image: {{ .Image }}
    command: ["worker"]
    environment:
      LORE_DATABASE_URL: postgres://lore:lore@paradedb:5432/lore?sslmode=disable
      # Must match lore-server's embedding config: the worker embeds stored memories,
      # serve embeds the query, and the two share one vector space only if identical.
      LORE_EMBEDDING_PROVIDER: "${LORE_EMBEDDING_PROVIDER:-}"
      LORE_EMBEDDING_BASE_URL: "${LORE_EMBEDDING_BASE_URL:-}"
      LORE_EMBEDDING_MODEL: "${LORE_EMBEDDING_MODEL:-}"
      LORE_EMBEDDING_DIM: "${LORE_EMBEDDING_DIM:-}"
      LORE_EMBEDDING_SEND_DIMENSIONS: "${LORE_EMBEDDING_SEND_DIMENSIONS:-}"
      LORE_EMBEDDING_API_KEY: "${LORE_EMBEDDING_API_KEY:-}"
      # OpenTelemetry traces are off unless LORE_OTEL_ENABLED=true AND an OTLP endpoint
      # is set; export both before `up` to ship traces to a collector.
      LORE_OTEL_ENABLED: "${LORE_OTEL_ENABLED:-}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
    depends_on:
      paradedb:
        condition: service_healthy
      lore-server:
        condition: service_healthy

  lore-provision:
    image: {{ .Image }}
    command: ["provision", "--out", "/creds/credentials"]
    environment:
      LORE_DATABASE_URL: postgres://lore:lore@paradedb:5432/lore?sslmode=disable
    depends_on:
      lore-server:
        condition: service_healthy
    restart: "no"
    # The image runs as nonroot, but Docker creates the bind-mount source directory
    # as root, so a nonroot process cannot write the credentials file into it. Run
    # this one-shot as root so the write succeeds; the file itself is 0600.
    user: "0:0"
    volumes:
      - ./.lore:/creds

  # Optional diagnostics UI — remove or comment this block to run headless. It is a
  # read-only inspector for the local stack: browse memories, view run traces, and
  # soft-delete. Bound to localhost only — do not expose it to a network, and never
  # put an auth-less reverse proxy in front of it.
  lore-inspector:
    restart: unless-stopped
    image: {{ .InspectorImage }}
    environment:
      # Reach the server over the compose network; read the provisioned project key
      # from the read-only credentials mount so it auto-connects with no browser step.
      LORE_API_URL: http://lore-server:8080
      LORE_CREDENTIALS_FILE: /creds/credentials
    ports:
      # Localhost bind only (not 0.0.0.0) — the diagnostics UI is unauthenticated.
      - "127.0.0.1:3000:3000"
    depends_on:
      lore-server:
        condition: service_healthy
      # Wait for the credentials file to exist before starting.
      lore-provision:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - ./.lore:/creds:ro

volumes:
  paradedb-data:
  minio-data:
