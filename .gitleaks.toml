# gitleaks config for the public repo: gitleaks' default secret rules plus two
# project guards — billing-provider secrets and stray monthly price points.
title = "lore gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Ignore this config's own file (its example rule patterns must not self-trip)"
paths = ['''\.gitleaks\.toml''']

[[rules]]
id = "lore-billing-secret"
description = "Payment/billing provider secret leaked into the OSS repo"
regex = '''(sk_live_[0-9a-zA-Z]{20,}|whsec_[0-9a-zA-Z]{20,})'''
tags = ["lore", "billing"]

[[rules]]
id = "lore-price-point"
description = "Price points / tier pricing must not appear in the OSS repo"
regex = '''\$\d{2,4}\s*(/|per\s+)(mo(nth)?|ay)\b'''
tags = ["lore", "planning-boundary"]
