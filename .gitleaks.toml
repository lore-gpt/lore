# gitleaks config — default rules + Lore "cloud leak linter" (opencore sheet §3.3):
# the PUBLIC repo must never contain cloud endpoints, customer names, price logic, or internal metrics.
title = "lore gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Ignore this config's own patterns and the published local-dev placeholder key"
paths = ['''\.gitleaks\.toml''']
# `local-dev-key` is the throwaway dev bearer token shipped in docker-compose and
# the README quickstart — a documented placeholder, not a secret. It trips the
# default curl-auth-header rule (which matches any Bearer value). This narrow
# allowlist does not touch the boundary rules below.
regexes = ['''local-dev-key''']

[[rules]]
id = "lore-cloud-endpoint"
description = "Internal cloud endpoint / control-plane host leaked into the OSS repo"
regex = '''(api\.internal\.loregpt|control-plane\.loregpt|billing\.loregpt|gateway\.internal\.loregpt)[a-z0-9.\-]*'''
tags = ["lore", "cloud-boundary"]

[[rules]]
id = "lore-billing-secret"
description = "Payment/billing provider secret leaked into the OSS repo"
regex = '''(sk_live_[0-9a-zA-Z]{20,}|whsec_[0-9a-zA-Z]{20,})'''
tags = ["lore", "billing"]

[[rules]]
id = "lore-planning-doc-marker"
description = "Internal planning-document content must not appear in the OSS repo (boundary guard)"
regex = '''(?i)(master[- ]brief|internal[- ]docs|internal-documents|child[- ]brief|ADR-0?(08|16|21|22)\b)'''
tags = ["lore", "planning-boundary"]

[[rules]]
id = "lore-price-point"
description = "Price points / tier pricing must not appear in the OSS repo (boundary guard)"
regex = '''\$\d{2,4}\s*(/|per\s+)(mo(nth)?|ay)\b'''
tags = ["lore", "planning-boundary"]
